  My name is <mark>Amirhossein</mark> Esmaeilpour. +5 Years’ Experience in <mark>Telecom</mark> domain in MCCI, the biggest telecom company in the Middle East. I have developed strong programming, analytical thinking, and problem-solving skills through 5 years of experience as a <mark>Developer</mark>, <mark>System Analyst</mark>, and <mark>Tester</mark> in the Iranian market and through multiple digital transformation projects and academic endeavors. Meanwhile, I studied <mark>AI</mark> for my Master’s degree to advance my knowledge in cutting-edge technologies in my favorite field. Currently, I am pursuing a Doctorate in <mark>Administrative Sciences</mark>, specializing in Operations and Decision Systems at the business school of <mark>Laval University</mark>. My research is part of a project related to decision support for <mark>Search and Rescue Operations</mark> under Canadian jurisdiction. This marks an exciting new chapter in my professional journey.  
