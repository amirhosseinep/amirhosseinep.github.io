about_content: | # this will include new lines to allow paragraphs
  My name is Amirhossein Esmaeilpour. +5 Years’ Experience in Telecom domain in MCCI, the biggest telecom company in the Middle East. I have high programming, analytical thinking, and problem-solving skills developed through 5 years of experience as a Developer, System Analyst, and Tester in Iran Market and in Digital Transformation and multiple academic projects. Meantime, I studied <mark>AI</mark> for my Master’s degree in order to improve my knowledge to state-of-the-art science in my favorite field. Currently, I am studying Doctorate in <mark>Administrative Sciences</mark>, major in Operations and Decision Systems in at the business school of <mark>Laval University</mark>. My project is part of a research project related to decision support for <mark>search and rescue operations</mark> under Canadian jurisdiction. This is a new journey for me...

