Objet : Candidature pour le poste de [Nom du poste]

Madame, Monsieur,

Je vous écris pour candidater au poste de [Nom du poste] chez [Nom de l’entreprise]. Fort de mon expérience en génie logiciel et en intelligence artificielle, ainsi que de mes cinq années de travail chez Huawei, je suis convaincu que je peux apporter une contribution significative à votre équipe.

J’ai obtenu un diplôme en génie logiciel, suivi d’une maîtrise en intelligence artificielle. Ces formations m’ont permis de développer des compétences solides en programmation, en analyse de données et en résolution de problèmes complexes. Pendant cinq ans chez Huawei, j’ai travaillé comme développeur, analyste et testeur de systèmes pour le marché iranien. J’ai notamment participé à des projets où j’ai conçu et testé des logiciels, renforçant mon expertise technique et mes compétences en gestion de projet. Cette expérience internationale m’a appris à travailler en équipe et à répondre à des défis techniques variés, ce qui serait utile pour votre entreprise.

Je suis motivé par ce poste car je souhaite participer à des projets innovants en IA. Il est important que je puisse mettre mes compétences au service d’une entreprise qui valorise le développement technologique. Mon objectif est de continuer à grandir professionnellement tout en contribuant à des solutions modernes.

Je vous remercie de l’attention que vous porterez à ma candidature. Je suis disponible pour un entretien afin de discuter de mes qualifications et de ma motivation.

Veuillez agréer, Madame, Monsieur, l’expression de mes salutations distinguées.

