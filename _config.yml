      Avant que je ne commence mon doctorat, j'avais déjà acquis une solide formation en génie logiciel et en intelligence artificielle. Pendant mes études, je cherchais constamment à repousser les limites de mes connaissances. Cette quête d'excellence m'a conduit chez Huawei, où je travaillais sur des projets innovants pour le marché iranien. À l'époque, je développais déjà des solutions qui anticipaient les besoins futurs de l'industrie.  

      Actuellement, alors que je poursuis mon projet doctoral, j'ai constaté qu'il était essentiel que nous puissions optimiser les opérations de sauvetage maritime grâce à l'intelligence artificielle. Ce travail ambitieux nécessite des ressources importantes, particulièrement pour l'accès aux outils de calcul haute performance. Pendant que je conduisais mes recherches préliminaires, j'avais déjà identifié plusieurs pistes prometteuses qui nécessitent un soutien financier substantiel.  

      Il est crucial que cette recherche puisse se poursuivre dans les meilleures conditions. Cette bourse jouerait un rôle déterminant dans la réussite de mon projet, avant que nous ne passions aux phases critiques de développement et de test. Pendant que je planifiais mes objectifs de recherche, j'ai toujours maintenu une vision claire de l'impact sociétal que je souhaitais avoir.  

      Je vous remercie de l'attention que vous porterez à ma demande. Il serait important que nous puissions discuter plus en détail de mon projet et de ses implications lors d'un entretien.  

